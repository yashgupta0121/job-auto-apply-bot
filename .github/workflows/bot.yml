name: Job Auto Apply Bot

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        run: python auto_apply.py
